<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 500">
  <defs>
    <filter id="isle-shadow">
      <feDropShadow dx="1" dy="1.5" stdDeviation="2" flood-color="#6b8fa8" flood-opacity="0.18"/>
    </filter>
    <!-- subtle sea texture gradient -->
    <linearGradient id="sea" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8dcea"/>
      <stop offset="100%" stop-color="#d8eaf4"/>
    </linearGradient>
  </defs>

  <!-- Sea -->
  <rect width="360" height="500" fill="url(#sea)"/>

  <!-- Okinawa (small island, bottom-left) -->
  <path d="M 28,440 L 50,433 L 62,438 L 57,448 L 32,452 Z"
        fill="#e8e4d8" stroke="#b4aea0" stroke-width="0.8" filter="url(#isle-shadow)"/>
  <text x="45" y="462" font-size="7.5" fill="#9a9488" text-anchor="middle" font-family="sans-serif">沖縄</text>

  <!-- Kyushu -->
  <path d="M 66,262
           L 80,270
           L 98,298
           L 95,334
           L 80,368
           L 58,382
           L 38,363
           L 34,326
           L 40,294
           L 50,275
           Z"
        fill="#e8e4d8" stroke="#b4aea0" stroke-width="1.2" filter="url(#isle-shadow)"/>

  <!-- Shikoku -->
  <path d="M 114,308
           L 155,297
           L 190,308
           L 188,344
           L 155,358
           L 112,342
           Z"
        fill="#e8e4d8" stroke="#b4aea0" stroke-width="1" filter="url(#isle-shadow)"/>

  <!-- Honshu (main island) -->
  <!-- Sea of Japan coast: NW Aomori → Niigata → Noto → Kanazawa → Fukui → Kinki → Shimane → Shimonoseki -->
  <!-- Pacific coast: Hiroshima(Seto) → Osaka → Kii Peninsula → Nagoya → Shizuoka → Cape Inubo → Tohoku → Aomori SE -->
  <path d="
    M 225,126
    L 204,168
    L 188,178
    L 194,192
    L 166,207
    L 143,228
    L 103,245
    L 65,263
    L 93,256
    L 143,253
    L 150,273
    L 165,254
    L 178,246
    L 215,237
    L 255,218
    L 242,162
    L 231,132
    Z"
        fill="#e8e4d8" stroke="#b4aea0" stroke-width="1.5" filter="url(#isle-shadow)"/>

  <!-- Hokkaido (main body) -->
  <path d="
    M 237,109
    L 212,72
    L 238,13
    L 278,19
    L 318,44
    L 323,63
    L 296,97
    L 258,100
    Z"
        fill="#e8e4d8" stroke="#b4aea0" stroke-width="1.2" filter="url(#isle-shadow)"/>

  <!-- Oshima Peninsula (south Hokkaido, pointing toward Honshu) -->
  <path d="M 237,109 L 225,120 L 231,130 L 240,120 Z"
        fill="#e8e4d8" stroke="#b4aea0" stroke-width="0.9"/>

  <!-- Tsushima (対馬, small, Sea of Japan) -->
  <path d="M 46,322 L 52,316 L 56,323 L 50,330 Z"
        fill="#e8e4d8" stroke="#b4aea0" stroke-width="0.7"/>

  <!-- Awaji Island (淡路島) -->
  <path d="M 148,264 L 156,260 L 160,268 L 155,278 L 147,272 Z"
        fill="#e8e4d8" stroke="#b4aea0" stroke-width="0.7"/>

  <!-- Compass rose (subtle) -->
  <g transform="translate(330,470)" opacity="0.35">
    <circle cx="0" cy="0" r="10" fill="none" stroke="#7a8fa0" stroke-width="0.8"/>
    <text x="0" y="-12" text-anchor="middle" font-size="8" fill="#7a8fa0" font-family="sans-serif">N</text>
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#7a8fa0" stroke-width="0.8"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#7a8fa0" stroke-width="0.8"/>
  </g>
</svg>
